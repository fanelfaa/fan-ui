language: typescript
layer: tool
stack: backend
dependsOn:
  - core
  - solid

tasks:
  generate-manifest:
    command: tsx src/scripts/generate-manifest.ts
    deps:
      - core:build
      - solid:build

  build:
    script: tsup && cp -r templates component-manifest.json dist/
    deps:
      - generate-manifest
    inputs:
      - src/**/*
      - component-manifest.json
      - templates/**/*
    outputs:
      - dist/**/*

  dev:
    command: tsup --watch

  typecheck:
    command: tsc --noEmit
    inputs:
      - src/**/*
      - tsconfig.json
