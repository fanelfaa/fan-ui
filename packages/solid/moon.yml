language: typescript
layer: library
stack: frontend
dependsOn:
  - core

tasks:
  build:
    command: 'pnpm run build'
    deps:
      - 'core:build'
    inputs:
      - 'src/**'
    outputs:
      - 'dist/**'
  dev:
    command: 'pnpm run dev'
    deps:
      - 'core:build'
  typecheck:
    command: 'tsc --noEmit'