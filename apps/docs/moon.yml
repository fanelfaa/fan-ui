language: typescript
layer: application
stack: frontend
dependsOn:
  - solid

tasks:
  dev:
    command: 'pnpm dev'
    deps:
      - 'solid:build'
  typecheck:
    command: 'pnpm typecheck'
    deps:
      - 'solid:build'
  build:
    command: 'pnpm build'
    deps:
      - 'solid:build'
    inputs:
      - 'src/**/*'
      - 'astro.config.mjs'
    outputs:
      - 'dist'
  preview:
    command: 'pnpm preview'
    deps:
      - 'build'