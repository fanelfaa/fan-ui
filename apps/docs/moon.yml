language: typescript
layer: application
stack: frontend
dependsOn:
  - solid

tasks:
  dev:
    command: 'vite'
    deps:
      - 'solid:build'
  build:
    command: 'vite build'
    deps:
      - 'solid:build'
    inputs:
      - 'src/**/*'
      - 'index.html'
      - 'vite.config.ts'
    outputs:
      - 'dist'
  preview:
    command: 'vite preview'